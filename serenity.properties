serenity.project.name=Demoblaze E2E Tests
serenity.test.root=com.demoblaze

# WebDriver Configuration
webdriver.driver=chrome
webdriver.chrome.driver=

# Chrome Options - Start Maximized
chrome.switches=--start-maximized,--disable-infobars,--disable-extensions,--disable-gpu,--disable-dev-shm-usage,--no-sandbox
chrome_preferences.download.prompt_for_download=false

serenity.take.screenshots=FOR_FAILURES
serenity.verbose.steps=false
serenity.report.show.step.details=true
serenity.console.colors=true

# Timeouts
webdriver.timeouts.implicitlywait=10000
webdriver.wait.for.timeout=15000
